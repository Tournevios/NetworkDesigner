name: Android – Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      build:
        description: 'Run build (required to trigger on feature branches)'
        type: boolean
        default: false
      create_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - id: decide
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" || "${{ github.event_name }}" == "pull_request" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.build }}" == "true" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build-android:
    name: Build APK (arm64-v8a, Qt6)
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    env:
      # Qt 6.7 requires NDK r26: its libs reference C++17 PMR symbols that
      # only exist in r26's libc++_shared.so. Building with r25 produced an
      # APK whose libc++ lacked them → UnsatisfiedLinkError on every launch.
      ANDROID_NDK_VERSION: '26.1.10909125'
      QT_VERSION: '6.7.3'
      QT_DIR: '${{ github.workspace }}/Qt'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and platform 34
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      - name: Keep only android-34 platform
        run: |
          # All ext preview platforms (android-35-extXX, android-36-extXX, etc)
          # installed by setup-android have corrupt android.jar — remove everything
          # except the android-34 we just installed explicitly.
          find "$ANDROID_SDK_ROOT/platforms" -mindepth 1 -maxdepth 1 \
            ! -name "android-34" -exec rm -rf {} +
          ls "$ANDROID_SDK_ROOT/platforms/"

      # Install both Qt variants via aqt for predictable, fixed paths
      - name: Install aqt
        run: pip install aqtinstall

      - name: Install Qt desktop (host tools)
        run: |
          aqt install-qt linux desktop ${{ env.QT_VERSION }} linux_gcc_64 \
            --outputdir ${{ env.QT_DIR }}
          echo "QT_HOST_PATH=${{ env.QT_DIR }}/${{ env.QT_VERSION }}/gcc_64" >> $GITHUB_ENV

      - name: Install Qt for Android (arm64-v8a)
        run: |
          aqt install-qt linux android ${{ env.QT_VERSION }} android_arm64_v8a \
            --outputdir ${{ env.QT_DIR }}
          echo "QT_ANDROID_ROOT=${{ env.QT_DIR }}/${{ env.QT_VERSION }}/android_arm64_v8a" >> $GITHUB_ENV

      - name: Add Qt tools to PATH
        run: echo "${{ env.QT_DIR }}/${{ env.QT_VERSION }}/gcc_64/bin" >> $GITHUB_PATH

      - name: Configure (Android arm64)
        run: |
          cmake -B build-android \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_FIND_ROOT_PATH="$QT_ANDROID_ROOT" \
            -DCMAKE_PREFIX_PATH="$QT_ANDROID_ROOT" \
            -DQt6_DIR="$QT_ANDROID_ROOT/lib/cmake/Qt6" \
            -DQT_HOST_PATH="$QT_HOST_PATH" \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF

      - name: Build
        run: cmake --build build-android --parallel

      - name: Sign APK
        run: |
          UNSIGNED=$(find build-android -name "*unsigned*.apk" | head -1)
          if [ -z "$UNSIGNED" ]; then
            UNSIGNED=$(find build-android -name "*.apk" | head -1)
          fi
          echo "Signing: $UNSIGNED"
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          ALIGNED=NetworkDesigner-aligned.apk
          SIGNED=NetworkDesigner.apk
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/zipalign" -v 4 "$UNSIGNED" "$ALIGNED"
          "$ANDROID_SDK_ROOT/build-tools/34.0.0/apksigner" sign \
            --ks debug.keystore --ks-pass pass:android --key-pass pass:android \
            --out "$SIGNED" "$ALIGNED"
          echo "apk_path=$SIGNED" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetworkDesigner-Android-APK
          path: NetworkDesigner.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-android
          name: NetworkDesigner 1.0 (Android)
          files: NetworkDesigner.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  emulator-smoke-test:
    name: Emulator smoke test (launch APK, capture logcat)
    needs: build-android
    runs-on: ubuntu-latest

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: NetworkDesigner-Android-APK

      - name: Inspect APK contents
        run: |
          echo "== native libs and key files in the APK =="
          unzip -l NetworkDesigner.apk | grep -E "\.so$|AndroidManifest" || true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Boot emulator and launch the app
        uses: reactivecircus/android-emulator-runner@v2
        with:
          # x86_64 google_apis images ship ARM translation, so the arm64-v8a
          # APK runs on the x86_64 emulator. API 34's translator supports the
          # newer SIMD instructions emitted by NDK r26 (API 30's SIGILLs).
          api-level: 34
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            adb install -r NetworkDesigner.apk
            adb logcat -c || true
            adb shell am start -W -n org.networkdesigner.app/org.qtproject.qt.android.bindings.QtActivity
            for t in 3 5 8 12 18 25 30; do
              sleep $t
              echo "pid after +${t}s: [$(adb shell pidof org.networkdesigner.app || true)]"
              if [ "$t" = "8" ]; then
                adb exec-out screencap -p > emulator-screenshot-early.png || true
              fi
            done
            adb exec-out screencap -p > emulator-screenshot.png || true
            adb logcat -d > emulator-logcat.txt || true
            echo "== NetworkDesigner breadcrumbs =="
            grep -a "NetworkDesigner" emulator-logcat.txt | grep -a -v ActivityTaskManager | tail -40 || true
            echo "== crash signatures (if any) =="
            grep -a -E "FATAL EXCEPTION|Fatal signal|beginning of crash" emulator-logcat.txt || echo "none found"
            echo "== full crash context (java stack + tombstone) =="
            grep -a -B5 -A80 "FATAL EXCEPTION" emulator-logcat.txt || true
            grep -a -A60 "Fatal signal" emulator-logcat.txt || true
            echo "== app process lifecycle (who killed it and why) =="
            grep -a -E "ActivityManager|ActivityTaskManager|Zygote|lowmemorykiller|libprocessgroup|lmkd" emulator-logcat.txt \
              | grep -a -i -E "networkdesigner|died|Killing|kill|Force" | tail -40 || true
            echo "== last 60 log lines from the app process =="
            APP_PID=$(grep -a "D NetworkDesigner: main: starting" emulator-logcat.txt | head -1 | awk '{print $3}')
            echo "app pid was: [$APP_PID]"
            test -n "$APP_PID" && grep -a -E "^[0-9-]+ [0-9:.]+ +$APP_PID " emulator-logcat.txt | tail -60 || true
            PID=$(adb shell pidof org.networkdesigner.app || true)
            echo "app pid at end: [$PID]"
            test -n "$PID" && echo "APP_ALIVE" || { echo "APP_DEAD"; exit 1; }

      - name: Upload emulator evidence (logcat + screenshot)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-evidence
          path: |
            emulator-logcat.txt
            emulator-screenshot.png
            emulator-screenshot-early.png
          retention-days: 30
