name: Android – Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      build:
        description: 'Run build (required to trigger on feature branches)'
        type: boolean
        default: false
      create_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - id: decide
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/master" || "${{ github.event_name }}" == "pull_request" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.build }}" == "true" ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

  build-android:
    name: Build APK (arm64-v8a, Qt6)
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    env:
      ANDROID_NDK_VERSION: '25.1.8937393'
      QT_VERSION: '6.7.3'
      QT_DIR: '${{ github.workspace }}/Qt'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and platform 33
        run: |
          sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}" "platforms;android-33" "build-tools;33.0.2"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      # Install both Qt variants via aqt for predictable, fixed paths
      - name: Install aqt
        run: pip install aqtinstall

      - name: Install Qt desktop (host tools)
        run: |
          aqt install-qt linux desktop ${{ env.QT_VERSION }} linux_gcc_64 \
            --outputdir ${{ env.QT_DIR }}
          echo "QT_HOST_PATH=${{ env.QT_DIR }}/${{ env.QT_VERSION }}/gcc_64" >> $GITHUB_ENV

      - name: Install Qt for Android (arm64-v8a)
        run: |
          aqt install-qt linux android ${{ env.QT_VERSION }} android_arm64_v8a \
            --outputdir ${{ env.QT_DIR }}
          echo "QT_ANDROID_ROOT=${{ env.QT_DIR }}/${{ env.QT_VERSION }}/android_arm64_v8a" >> $GITHUB_ENV

      - name: Add Qt tools to PATH
        run: echo "${{ env.QT_DIR }}/${{ env.QT_VERSION }}/gcc_64/bin" >> $GITHUB_PATH

      - name: Configure (Android arm64)
        run: |
          cmake -B build-android \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_FIND_ROOT_PATH="$QT_ANDROID_ROOT" \
            -DCMAKE_PREFIX_PATH="$QT_ANDROID_ROOT" \
            -DQt6_DIR="$QT_ANDROID_ROOT/lib/cmake/Qt6" \
            -DQT_HOST_PATH="$QT_HOST_PATH" \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF

      - name: Build
        run: cmake --build build-android --parallel

      - name: Package APK with androiddeployqt
        run: |
          DEPLOY_JSON=$(find build-android -name "android-NetworkDesigner-deployment-settings.json" | head -1)
          if [ -z "$DEPLOY_JSON" ]; then
            echo "Deployment JSON not found, listing build-android:"
            find build-android -name "*.json" | head -20
            exit 1
          fi
          echo "Using deployment JSON: $DEPLOY_JSON"
          "$QT_ANDROID_ROOT/bin/androiddeployqt" \
            --input "$DEPLOY_JSON" \
            --output build-android/android-build \
            --android-platform android-33 \
            --jdk "$JAVA_HOME" \
            --apk

      - name: Locate APK
        id: find-apk
        run: |
          APK=$(find build-android/android-build -name "*.apk" | head -1)
          echo "Found APK: $APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetworkDesigner-Android-APK
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-android
          name: NetworkDesigner 1.0 (Android)
          files: ${{ steps.find-apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
