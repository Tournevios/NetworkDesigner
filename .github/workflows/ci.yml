name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: Build & Test (Ubuntu, Qt5)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qtbase5-dev \
            qtbase5-dev-tools \
            libgtest-dev \
            cmake \
            ninja-build \
            xvfb

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run unit tests
        run: ctest --test-dir build -R "^NetworkDesigner_tests" --output-on-failure

      - name: Run integration tests
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 1
          DISPLAY=:99 EXAMPLES_DIR=${{ github.workspace }}/examples \
            ctest --test-dir build -R "integration" --output-on-failure
